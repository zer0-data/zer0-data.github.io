<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="profile-container">
                <div class="photo-wrapper">
                    <!-- Replace 'profile.jpg' in the assets/images folder with your own photo! -->
                    <img src="{{ '/assets/images/profile.jpg' | relative_url }}" alt="{{ site.author }}"
                        class="profile-photo" id="profile-pic"
                        onerror="this.onerror=null; this.src='{{ '/assets/images/placeholder.svg' | relative_url }}';">
                </div>
                <h1>{{ site.author }}</h1>
                <p class="location">Gurugram, Haryana, India - 122018</p>

                <div class="contact-info">
                    <a href="mailto:{{ site.email }}" aria-label="Email"><i class="fas fa-envelope"></i> {{ site.email
                        }}</a>
                    <a href="tel:+917838668881" aria-label="Phone"><i class="fas fa-phone"></i> +91-7838668881</a>
                    <a href="https://linkedin.com/in/aryan-sood-05052k06" target="_blank" rel="noopener noreferrer"
                        aria-label="LinkedIn"><i class="fab fa-linkedin"></i> LinkedIn</a>
                    <a href="https://github.com/zer0-data" target="_blank" rel="noopener noreferrer"
                        aria-label="GitHub"><i class="fab fa-github"></i> GitHub</a>
                    <a href="https://scholar.google.com/citations?user=P66NEf0AAAAJ&hl=en&oi=sra" target="_blank"
                        rel="noopener noreferrer" aria-label="Google Scholar"><i class="fas fa-graduation-cap"></i>
                        Google Scholar</a>
                </div>
            </div>

            <nav class="toc">
                <ul>
                    <li><a href="#education">Education</a></li>
                    <li><a href="#publications">Publications</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#achievements">Achievements</a></li>
                    <li><a href="#extracurricular">Extracurricular</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            {{ content }}

            <footer>
                <p>&copy; <span id="year"></span> {{ site.author }}. All rights reserved.</p>
            </footer>
        </main>
    </div>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
