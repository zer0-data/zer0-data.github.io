<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="top-nav">
        <div class="nav-content">
            <div class="nav-brand">
                <!-- Name removed from ribbon per user request -->
            </div>

            <!-- Replace standard list with a dropdown button structure -->
            <div class="dropdown">
                <button class="dropbtn" aria-haspopup="true" aria-expanded="false">
                    Sections <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="#education">Education</a>
                    <a href="#publications">Publications</a>
                    <a href="#projects">Projects</a>
                    <a href="#achievements">Achievements</a>
                    <a href="#extracurricular">Extracurricular</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-container">
            <div class="hero-card">
                <div class="hero-photo">
                    <img src="{{ '/assets/images/profile.jpg' | relative_url }}" alt="{{ site.author }}"
                        class="profile-pic"
                        onerror="this.onerror=null; this.src='{{ '/assets/images/placeholder.svg' | relative_url }}';">
                </div>
                <div class="hero-text">
                    <h1>{{ site.author }}</h1>
                    <p class="tagline">Bachelor of Technology &mdash; Electrical Engineering, IIT Roorkee</p>
                    <p class="location">Gurugram, Haryana, India</p>

                    <div class="social-links">
                        <a href="mailto:{{ site.email }}" title="Email"><i class="fas fa-envelope"></i> Email</a>
                        <a href="tel:+917838668881" title="Phone"><i class="fas fa-phone"></i> +91-7838668881</a>
                        <a href="https://linkedin.com/in/aryan-sood-05052k06" target="_blank"
                            rel="noopener noreferrer"><i class="fab fa-linkedin"></i> LinkedIn</a>
                        <a href="https://github.com/zer0-data" target="_blank" rel="noopener noreferrer"><i
                                class="fab fa-github"></i> GitHub</a>
                        <a href="https://scholar.google.com/citations?user=P66NEf0AAAAJ&hl=en&oi=sra" target="_blank"
                            rel="noopener noreferrer"><i class="fas fa-graduation-cap"></i> Scholar</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="content-container">
        {{ content }}
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="year"></span> {{ site.author }}. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Sticky nav JS
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.top-nav');
            if (window.scrollY > 10) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Simple JS for accessible dropdown (helps click events on mobile)
        const dropbtn = document.querySelector('.dropbtn');
        const dropdownContent = document.querySelector('.dropdown-content');

        dropbtn.addEventListener('click', function (e) {
            e.stopPropagation();
            const expanded = this.getAttribute('aria-expanded') === 'true';
            this.setAttribute('aria-expanded', !expanded);
            dropdownContent.classList.toggle('show');
        });

        window.addEventListener('click', function () {
            if (dropdownContent.classList.contains('show')) {
                dropbtn.setAttribute('aria-expanded', 'false');
                dropdownContent.classList.remove('show');
            }
        });
    </script>
</body>

</html>
