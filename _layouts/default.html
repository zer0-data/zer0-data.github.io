<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>{{ site.author }}</h1>
            <p class="location">Gurugram, Haryana, India - 122018</p>
            <div class="contact-info">
                <a href="tel:+917838668881" aria-label="Phone"><i class="fas fa-phone"></i> +91-7838668881</a>
                <a href="mailto:{{ site.email }}" aria-label="Email"><i class="fas fa-envelope"></i> {{ site.email
                    }}</a>
                <a href="https://linkedin.com/in/aryan-sood-05052k06" target="_blank" rel="noopener noreferrer"
                    aria-label="LinkedIn"><i class="fab fa-linkedin"></i> Aryan Sood</a>
                <a href="https://github.com/zer0-data" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i
                        class="fab fa-github"></i> zer0-data</a>
                <a href="https://scholar.google.com/citations?user=P66NEf0AAAAJ&hl=en&oi=sra" target="_blank"
                    rel="noopener noreferrer" aria-label="Google Scholar"><i class="fas fa-graduation-cap"></i> Google
                    Scholar</a>
            </div>
        </header>

        <main>
            {{ content }}
        </main>

        <footer>
            <p>&copy; <span id="year"></span> {{ site.author }}. All rights reserved.</p>
        </footer>
    </div>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
